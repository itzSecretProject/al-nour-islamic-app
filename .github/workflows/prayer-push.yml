name: Prayer push trigger

# Pings the push sender so background prayer notifications go out.
# Vercel Hobby crons only run once/day, so we trigger from GitHub Actions.
# The sender uses a 12-minute grace window + per-device dedup, so a 5-minute
# schedule reliably delivers each prayer exactly once (GitHub's cron can drift a
# few minutes under load — the grace window absorbs that).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/push/send
        run: |
          curl -fsS "https://al-nour-islamic-app.vercel.app/api/push/send" || true
