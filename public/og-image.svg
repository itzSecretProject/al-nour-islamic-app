  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="220" fill="none" stroke="#059669" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="80" r="160" fill="none" stroke="#059669" stroke-width="1" opacity="0.12"/>
  <circle cx="150" cy="550" r="180" fill="none" stroke="#FCD34D" stroke-width="1" opacity="0.08"/>

