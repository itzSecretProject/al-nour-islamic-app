  <circle cx="600" cy="230" r="72" fill="#059669" opacity="0.2"/>
  <circle cx="600" cy="230" r="60" fill="#059669" opacity="0.3"/>
  <!-- Crescent moon icon -->
  <path d="M600 175 C635 175 665 200 665 230 C665 260 635 285 600 285 C622 272 636 252 636 230 C636 208 622 188 600 175Z" fill="#FCD34D"/>
  <circle cx="645" cy="200" r="8" fill="#FCD34D" opacity="0.7"/>

  <!-- App name -->
  <text x="600" y="355" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="68" fill="white" letter-spacing="-1">Al Nour</text>
  <text x="600" y="395" text-anchor="middle" font-family="serif" font-size="28" fill="#FCD34D" opacity="0.9">النور</text>

