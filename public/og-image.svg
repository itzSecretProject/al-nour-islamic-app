  <rect x="332" y="490" width="100" height="36" rx="18" fill="#059669" opacity="0.25"/>
  <text x="382" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#A7F3D0" font-weight="600">📖 Quran</text>

  <rect x="446" y="490" width="100" height="36" rx="18" fill="#059669" opacity="0.25"/>
  <text x="496" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#A7F3D0" font-weight="600">🧭 Qibla</text>

  <rect x="560" y="490" width="130" height="36" rx="18" fill="#059669" opacity="0.25"/>
  <text x="625" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#A7F3D0" font-weight="600">🔔 Reminders</text>

  <rect x="704" y="490" width="120" height="36" rx="18" fill="#059669" opacity="0.25"/>
  <text x="764" y="513" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#A7F3D0" font-weight="600">📵 Offline PWA</text>

