<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Nour - Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #022C22 0%, #064E3B 100%);
      color: #F3F4F6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2rem;
      padding: 2.5rem;
      max-width: 320px;
      margin: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite ease-in-out;
    }
    h1 {
      font-size: 1.5rem;
      color: #FCD34D;
      margin: 0 0 0.5rem 0;
      font-weight: 700;
    }
    h2 {
      font-size: 1.25rem;
      font-family: serif;
      color: #FCD34D;
      margin: 0 0 1rem 0;
    }
    p {
      font-size: 0.875rem;
      line-height: 1.5;
      color: #A7F3D0;
      opacity: 0.8;
      margin: 0 0 1.5rem 0;
    }
    .btn {
      background: #FCD34D;
      color: #022C22;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: 1rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.2s;
    }
    .btn:active {
      transform: scale(0.95);
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🕋</div>
    <h1>No Connection</h1>
    <h2>Sin Conexión</h2>
    <p>
      You are offline, but you can still access cached Quran surahs, tasbih count, and already downloaded monthly prayer times.
      <br><br>
      No tienes conexión, pero puedes seguir usando el Corán guardado, el contador de tasbih y los horarios de rezo ya descargados.
    </p>
    <button class="btn" onclick="window.location.reload()">Retry / Reintentar</button>
  </div>
</body>
</html>
